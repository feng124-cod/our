<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#e0b2d1}
  .heart{width:120px;height:100px;animation:beat 1s infinite;}
  .heart:before,.heart:after{content:"";position:absolute;left:60px;width:60px;height:95px;background:#ff8fab;border-radius:50px 50px 0 0;transform:rotate(-45deg);transform-origin:0 100%;}
  .heart:after{left:0;transform:rotate(45deg);transform-origin:100% 100%;}
  @keyframes beat{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
</style>
</head>
<body>
<div class="heart"></div>
<script>
setTimeout(()=>{location.href="login.html"}, 5000)
</script>
</body>
</html>
