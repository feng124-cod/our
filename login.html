<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body{height:100vh;margin:0;display:flex;justify-content:center;align-items:center;background:white;
  background-image:radial-gradient(pink 8%,transparent 8%),radial-gradient(pink 8%,transparent 8%);
  background-position:0 0,25px 25px;background-size:50px 50px;}
  .box{background:rgba(255,255,255,0.9);padding:40px;border-radius:20px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.1)}
  input{display:block;margin:10px auto;padding:10px;width:220px;border:2px solid #ff8fab;border-radius:12px;}
  button{background:#ff8fab;color:white;border:none;padding:10px 25px;border-radius:12px;cursor:pointer;}
  h2{color:#ff6b9d;}
</style>
</head>
<body>
<div class="box">
  <h2>我们的小世界</h2>
  <input id="user" placeholder="用户名"><br>
  <input id="pwd" type="password" placeholder="密码"><br>
  <button onclick="login()">进入</button>
</div>
<script>
function login(){
  let u=document.getElementById("user").value
  let p=document.getElementById("pwd").value
  if(u=="梨涡" && p=="20240111"){
    location.href="home.html"
  }else{
    alert("密码不对哦～")
  }
}
</script>
</body>
</html>
